    <script>
        function updateDateTime() {
            const now = new Date();
            const options = {
                weekday: 'long', year: 'numeric', month: 'long',
                day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: true
            };
            const manilaTime = now.toLocaleString('en-PH', { ...options, timeZone: 'Asia/Manila' });
            document.getElementById('currentDateTime').textContent = manilaTime;
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);
    </script>

    <!-- Search and Filter Section -->
    <section class="search-section" aria-label="Search flights">
        <div class="search-container">
            <span class="search-icon" aria-hidden="true">🔍</span>
            <input type="search" id="flight-search" class="search-input"
                placeholder="Search by destination, airline, or flight number..."
                aria-label="Search flights by destination, airline, or flight number" role="searchbox"
                autocomplete="off" aria-describedby="search-results-status">
            <button class="search-clear" id="search-clear-btn" aria-label="Clear search" type="button">✕</button>
        </div>

        <div id="search-results-status" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>

        <div class="sort-controls">
            <label for="sort-by" class="sort-label">Sort by:</label>
            <select id="sort-by" class="sort-select" aria-label="Sort flights by"
                aria-controls="international-flights domestic-flights">
                <option value="departure" selected>Departure Time</option>
                <option value="arrival">Arrival Time</option>
                <option value="duration">Duration</option>
                <option value="destination">Destination</option>
            </select>

            <button id="sort-order-toggle" class="sort-order-btn"
                aria-label="Toggle sort order between ascending and descending" aria-pressed="false"
                title="Sort order: Ascending">
                <span class="sort-icon" aria-hidden="true">↑</span>
                <span class="sort-order-text">Ascending</span>
            </button>
        </div>
    </section>

        <section aria-labelledby="international-heading">

        </section>

            <div class="card-grid" id="domestic-flights" role="list" aria-live="polite" aria-atomic="false">

        </section>
    </main>

    <script>
        function logError(error, context = '') {
            console.error('[Flight Schedule Error]', { context, message: error.message || error });
        }

        function validateFlightData(data) {
            if (!data || !data.international || !data.domestic) throw new Error('Invalid flight data');
            return true;
        }

        function initializeApp() {
            try {
                validateFlightData(window.flightData);
                const flightManager = new FlightManager(window.flightData.international, window.flightData.domestic);
                flightManager.updateDisplay('international-flights', 'domestic-flights');
                return flightManager;
            } catch (error) {
                logError(error, 'App Initialization');
                return null;
            }
        }

        const flightManager = initializeApp();
        if (typeof initializeLazyLoading === 'function') initializeLazyLoading();

        if (flightManager) {
            setupEventHandlers(flightManager);
        }

        function debounce(func, wait) {
            let timeout;
            return function (...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        function setupEventHandlers(flightManager) {
            const searchInput = document.getElementById('flight-search');
            const searchClearBtn = document.getElementById('search-clear-btn');
            const sortBySelect = document.getElementById('sort-by');
            const sortOrderBtn = document.getElementById('sort-order-toggle');

            const performSearch = debounce((searchTerm) => {
                flightManager.filterFlights(searchTerm, 'both');
                flightManager.updateDisplay('international-flights', 'domestic-flights');
                if (searchTerm.trim()) searchClearBtn.classList.add('visible');
                else searchClearBtn.classList.remove('visible');
            }, 300);

            searchInput.addEventListener('input', (e) => performSearch(e.target.value));
            searchClearBtn.addEventListener('click', () => {
                searchInput.value = '';
                performSearch('');
            });

            sortBySelect.addEventListener('change', (e) => {
                flightManager.sortFlights(e.target.value, document.getElementById('sort-order-toggle').getAttribute('aria-pressed') === 'true' ? 'desc' : 'asc');
                flightManager.updateDisplay('international-flights', 'domestic-flights');
            });

            sortOrderBtn.addEventListener('click', () => {
                const isDesc = sortOrderBtn.getAttribute('aria-pressed') === 'true';
                const newOrder = isDesc ? 'asc' : 'desc';
                sortOrderBtn.setAttribute('aria-pressed', !isDesc);
                sortOrderBtn.querySelector('.sort-icon').textContent = newOrder === 'desc' ? '↓' : '↑';
                sortOrderBtn.querySelector('.sort-order-text').textContent = newOrder === 'desc' ? 'Descending' : 'Ascending';
                flightManager.sortFlights(sortBySelect.value, newOrder);
                flightManager.updateDisplay('international-flights', 'domestic-flights');
            });
        }
    </script>
